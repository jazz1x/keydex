name: guard

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: guard
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install guard tools
        run: brew install ripgrep
      - name: Swift version
        run: swift --version
      - name: Guard
        run: make guard

  quality:
    name: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install quality tools
        run: brew install ripgrep
      - name: Swift version
        run: swift --version
      - name: Quality
        run: make quality
