default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: keydex-guard
        name: keydex guard
        entry: ./scripts/guard.sh
        language: system
        pass_filenames: false
        files: ^(Package.swift|Sources/|Tests/|Apps/|scripts/|Makefile)
      - id: keydex-quality
        name: keydex quality
        entry: ./scripts/quality.sh
        language: system
        pass_filenames: false
        files: ^(README.md|CONTRIBUTING.md|docs/|scripts/|.github/)
